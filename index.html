<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Drone Racing</title>
    <meta name="description" content="Corrida de Drone em VR">
    <!-- Evitar cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- A-Frame Core -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <!-- A-Frame Extras -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <!-- Estilos CSS -->
    <link rel="stylesheet" type="text/css" href="css/style.css?v=1.0.2">
</head>
<body>
    <!-- Carregamento dos scripts do jogo - APENAS UMA VEZ -->
    <script src="js/utils.js?v=1.0.2"></script>
    <script src="js/drone-controller.js?v=1.0.2"></script>
    <script src="js/checkpoint-system.js?v=1.0.2"></script>
    <script src="js/collision-system.js?v=1.0.2"></script>
    <script src="js/game-manager.js?v=1.0.2"></script>
    <script src="js/urban-environment.js?v=1.0.2"></script>
    <script src="js/performance-monitor.js?v=1.0.2"></script>
    <script src="js/audio-system.js?v=1.0.2"></script>
    <script src="js/navigation-arrow.js?v=1.0.2"></script>

    <!-- ÚNICA A-SCENE - Combinando atributos das duas anteriores -->
    <a-scene 
        vr-mode-ui="enabled: true" 
        background="color: #87CEEB"
        fog="type: linear; color: #87CEEB; near: 50; far: 200"
        game-manager="totalCheckpoints: 5; timeLimit: 120"
        urban-environment="citySize: 150; buildingCount: 40; obstacleCount: 25; treeCount: 15"
        performance-monitor="targetFPS: 60; minFPS: 45; autoOptimize: true; showStats: true"
        audio-system="masterVolume: 0.7; musicVolume: 0.4; sfxVolume: 0.8; ambientVolume: 0.3; enableAudio: true"
        collision-system="enabled: true; bounceForce: 0.5; showEffects: true; soundEnabled: true">
        
        <!-- Assets -->
        <a-assets>
            <!-- Mixins para reutilização -->
            <a-mixin id="checkpoint" 
                geometry="primitive: torus; radius: 4; radiusTubular: 0.5" 
                material="color: #00ff00; transparent: true; opacity: 0.8; metalness: 0.3; roughness: 0.4"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
            </a-mixin>
            
            <a-mixin id="building" 
                material="color: #666; roughness: 0.8; metalness: 0.2"
                physics-body="type: static; shape: box">
            </a-mixin>

            <a-mixin id="propeller"
                geometry="primitive: cylinder; radius: 0.6; height: 0.03"
                material="color: #ff4444; transparent: true; opacity: 0.4">
            </a-mixin>
        </a-assets>

        <!-- Ambiente e Iluminação -->
        
        <!-- Iluminação -->
        <a-light type="ambient" color="#404040" intensity="0.5"></a-light>
        <a-light type="directional" 
                 position="20 40 20" 
                 color="#ffffff" 
                 intensity="1.2" 
                 shadow="cast: true; mapSize: 2048; cameraFar: 100; cameraNear: 0.1">
        </a-light>

        <!-- Drone Principal -->
        <a-entity id="drone" 
                  position="0 3 0"
                  drone-controller
                  navigation-arrow
                  physics-body="type: dynamic; mass: 2; linearDamping: 0.1; angularDamping: 0.1">
            
            <!-- Corpo do Drone -->
            <a-entity id="drone-body"
                      geometry="primitive: box; width: 1.2; height: 0.4; depth: 1.2"
                      material="color: #00aa00; metalness: 0.8; roughness: 0.2; emissive: #002200">
                
                <!-- Luzes LED do drone -->
                <a-entity geometry="primitive: sphere; radius: 0.05" 
                          material="color: #ff0000; emissive: #ff0000" 
                          position="0.5 0.1 0.5"></a-entity>
                <a-entity geometry="primitive: sphere; radius: 0.05" 
                          material="color: #00ff00; emissive: #00ff00" 
                          position="-0.5 0.1 0.5"></a-entity>
                <a-entity geometry="primitive: sphere; radius: 0.05" 
                          material="color: #0000ff; emissive: #0000ff" 
                          position="0.5 0.1 -0.5"></a-entity>
                <a-entity geometry="primitive: sphere; radius: 0.05" 
                          material="color: #ffff00; emissive: #ffff00" 
                          position="-0.5 0.1 -0.5"></a-entity>
            </a-entity>

            <!-- Braços do Drone -->
            <a-entity geometry="primitive: cylinder; radius: 0.08; height: 2" 
                      material="color: #333; metalness: 0.7"
                      position="0.8 0 0.8" 
                      rotation="0 45 0"></a-entity>
            <a-entity geometry="primitive: cylinder; radius: 0.08; height: 2" 
                      material="color: #333; metalness: 0.7"
                      position="-0.8 0 0.8" 
                      rotation="0 -45 0"></a-entity>
            <a-entity geometry="primitive: cylinder; radius: 0.08; height: 2" 
                      material="color: #333; metalness: 0.7"
                      position="0.8 0 -0.8" 
                      rotation="0 -45 0"></a-entity>
            <a-entity geometry="primitive: cylinder; radius: 0.08; height: 2" 
                      material="color: #333; metalness: 0.7"
                      position="-0.8 0 -0.8" 
                      rotation="0 45 0"></a-entity>

            <!-- Hélices -->
            <a-entity id="prop1" mixin="propeller"
                      position="1.1 0.3 1.1"
                      animation="property: rotation; to: 0 3600 0; loop: true; dur: 100"></a-entity>
            <a-entity id="prop2" mixin="propeller"
                      position="-1.1 0.3 1.1"
                      animation="property: rotation; to: 0 -3600 0; loop: true; dur: 100"></a-entity>
            <a-entity id="prop3" mixin="propeller"
                      position="1.1 0.3 -1.1"
                      animation="property: rotation; to: 0 -3600 0; loop: true; dur: 100"></a-entity>
            <a-entity id="prop4" mixin="propeller"
                      position="-1.1 0.3 -1.1"
                      animation="property: rotation; to: 0 3600 0; loop: true; dur: 100"></a-entity>

            <!-- Câmera do Drone -->
            <a-camera id="drone-camera" 
                      position="0 0.8 -3" 
                      rotation="-15 0 0"
                      wasd-controls="enabled: false"
                      look-controls="enabled: true; pointerLockEnabled: false">
                
                <!-- HUD do jogador -->
                <a-entity id="hud" position="0 0 -2">
                    <a-text id="timer" 
                            position="-1.5 1 0" 
                            value="Tempo: 00:00" 
                            color="#00ff00" 
                            scale="0.8 0.8 0.8"
                            font="kelsonsans"></a-text>
                    <a-text id="checkpoint-counter" 
                            position="1.5 1 0" 
                            value="Checkpoint: 0/5" 
                            color="#00ff00" 
                            scale="0.8 0.8 0.8"
                            font="kelsonsans"></a-text>
                    <a-text id="speed-indicator" 
                            position="0 -1.2 0" 
                            value="Velocidade: 0 km/h" 
                            color="#ffff00" 
                            scale="0.6 0.6 0.6"
                            font="kelsonsans"></a-text>
                </a-entity>
            </a-camera>
        </a-entity>

        <!-- Percurso de Checkpoints -->
        <a-entity mixin="checkpoint" position="15 8 -15" checkpoint="id: 1"></a-entity>
        <a-entity mixin="checkpoint" position="-20 12 -30" checkpoint="id: 2"></a-entity>
        <a-entity mixin="checkpoint" position="25 6 -45" checkpoint="id: 3"></a-entity>
        <a-entity mixin="checkpoint" position="-15 18 -60" checkpoint="id: 4"></a-entity>
        <a-entity mixin="checkpoint" position="0 10 -75" checkpoint="id: 5"></a-entity>

        <!-- Chão base (será complementado pelo ambiente urbano) -->
        <a-plane position="0 0 0" 
                 rotation="-90 0 0" 
                 width="400" 
                 height="400" 
                 color="#2d5a27" 
                 shadow="receive: true"></a-plane>

        <!-- Controles VR Meta Quest 3 -->
        <a-entity id="leftHand" 
                  hand-controls="hand: left; handModelStyle: lowPoly; color: #ffcccc"
                  oculus-touch-controls="hand: left"
                  quest-controls="hand: left"
                  position="-0.5 1 -0.5">
        </a-entity>
        
        <a-entity id="rightHand" 
                  hand-controls="hand: right; handModelStyle: lowPoly; color: #ccffcc"
                  oculus-touch-controls="hand: right"
                  quest-controls="hand: right"
                  position="0.5 1 -0.5">
        </a-entity>

        <!-- Linha de chegada -->
        <a-entity geometry="primitive: box; width: 20; height: 0.5; depth: 2"
                  material="color: #ff0000; transparent: true; opacity: 0.7"
                  position="0 1 -90"
                  finish-line></a-entity>
    </a-scene>

    <!-- Tela de carregamento -->
    <div id="loading">
        <h2>Carregando Drone Racing VR...</h2>
        <p>Prepare seu Meta Quest 3!</p>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <script>
        // Inicializar o jogo quando a cena estiver carregada
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎮 Inicializando o jogo...');
            
            const scene = document.querySelector('a-scene');
            scene.addEventListener('loaded', function() {
                // Iniciar componentes principais após 2 segundos
                setTimeout(function() {
                    // Iniciar drone
                    const drone = document.querySelector('#drone');
                    if (drone && drone.components['drone-controller']) {
                        drone.components['drone-controller'].activateDrone();
                        console.log('✅ Drone ativado com sucesso!');
                    } else {
                        console.error('❌ Erro ao ativar o drone!');
                    }
                    
                    // Iniciar o jogo
                    const gameManager = document.querySelector('[game-manager]');
                    if (gameManager && gameManager.components['game-manager']) {
                        gameManager.components['game-manager'].startGame();
                        console.log('✅ Jogo iniciado com sucesso!');
                    } else {
                        console.error('❌ Erro ao iniciar o jogo!');
                    }
                    
                    // Esconder tela de carregamento
                    const loading = document.getElementById('loading');
                    if (loading) {
                        loading.style.display = 'none';
                    }
                    
                    console.log('✅ Jogo inicializado com sucesso!');
                }, 2000);
            });
        });
    </script>
</body>
</html>
